name: Update Apple Calendar EDT

on:
  schedule:
    # S'exécute tous les jours à 18:00 UTC
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # IMPORTANT : Permet de push le fichier .ics
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Installer dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lancer le Bot
        env:
          EPSI_USER: ${{ secrets.EPSI_USER }}
          EPSI_PASS: ${{ secrets.EPSI_PASS }}
        run: python main.py

      - name: Sauvegarder le calendrier sur GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add mon_edt.ics
          git commit -m "Mise à jour auto de l'emploi du temps" || exit 0
          git push
